<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Dispatcher Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: var(--accent); margin-bottom: 2rem; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid #334155;
        }
        th { color: var(--text-dim); font-weight: 600; }
        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.3rem;
        }
        button {
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); }
        input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LLM Dispatcher Control Panel</h1>

        <div class="card">
            <h2>Add Provider</h2>
            <div id="provider-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="p-name" placeholder="e.g. DeepSeek">
                </div>
                <div class="form-group">
                    <label>Base URL</label>
                    <input type="text" id="p-url" placeholder="https://api.deepseek.com">
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="p-key">
                </div>
                <div class="form-group">
                    <label>Models (comma separated)</label>
                    <input type="text" id="p-models" placeholder="deepseek-chat, deepseek-reasoner">
                </div>
                <button onclick="addProvider()">Save Provider</button>
            </div>
        </div>

        <div class="card">
            <h2>Active Providers</h2>
            <table id="provider-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>URL</th>
                        <th>Models</th>
                        <th>Quota</th>
                        <th>Weight</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchProviders() {
            const res = await fetch('/admin/providers');
            const data = await res.json();
            const tbody = document.querySelector('#provider-table tbody');
            tbody.innerHTML = '';
            data.forEach(p => {
                const row = `<tr>
                    <td>${p.name}</td>
                    <td>${p.base_url}</td>
                    <td>${p.models.map(m => `<span class="badge">${m}</span>`).join('')}</td>
                    <td>${p.current_requests_today}/${p.max_requests_per_day}</td>
                    <td>${p.weight}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        async function addProvider() {
            const data = {
                name: document.getElementById('p-name').value,
                base_url: document.getElementById('p-url').value,
                api_key: document.getElementById('p-key').value,
                models: document.getElementById('p-models').value.split(',').map(m => m.trim())
            };
            await fetch('/admin/providers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            fetchProviders();
        }

        fetchProviders();
    </script>
</body>
</html>
